<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lane7 IT — Staff Directory</title>
  <style>
    :root {
      --bg: #0C0C0C;
      --surface: #161616;
      --surface2: #1E1E1E;
      --card: #181818;
      --border: #2A2A2A;
      --pink: #FF1744;
      --gold: #FFD600;
      --blue: #00BCD4;
      --orange: #FF6D00;
      --purple: #7C4DFF;
      --green: #00E676;
      --text: #FFFFFF;
      --sub: #888888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-badge {
      background: var(--blue);
      color: #000;
      font-weight: 900;
      font-size: 13px;
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-title { font-size: 16px; font-weight: 700; }
    .logo-title span { color: var(--blue); }
    .logo-sub { font-size: 11px; color: var(--sub); margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .timestamp { font-size: 11px; color: var(--sub); }
    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn:hover { border-color: var(--blue); color: var(--blue); }
    .icon-btn { width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }

    /* Controls bar */
    .controls {
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 340px;
    }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--sub);
      font-size: 14px;
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 12px 9px 32px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--blue); }
    .search-wrap input::placeholder { color: var(--sub); }

    /* Dept filter chips */
    .dept-chips {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .dept-chips::-webkit-scrollbar { display: none; }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--sub);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .chip:hover { border-color: var(--blue); color: var(--blue); }
    .chip.active { background: var(--blue); border-color: var(--blue); color: #000; font-weight: 600; }
    .chip.all.active { background: var(--blue); }

    .count-badge {
      margin-left: auto;
      font-size: 11px;
      color: var(--sub);
      white-space: nowrap;
    }

    /* Grid */
    .grid-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .grid-wrap::-webkit-scrollbar { width: 5px; }
    .grid-wrap::-webkit-scrollbar-track { background: transparent; }
    .grid-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    /* Staff card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s, transform 0.15s;
    }
    .card:hover { border-color: #3A3A3A; transform: translateY(-2px); }

    .card-top { display: flex; align-items: center; gap: 14px; }
    .avatar {
      width: 46px; height: 46px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      color: #000;
    }
    .card-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
    .card-role { font-size: 11px; color: var(--sub); margin-top: 2px; }

    .card-dept {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 3px 9px;
      border-radius: 10px;
      width: fit-content;
    }

    .card-links { display: flex; flex-direction: column; gap: 5px; }
    .card-link {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--sub);
      text-decoration: none;
      padding: 4px 6px;
      border-radius: 5px;
      transition: background 0.15s, color 0.15s;
      overflow: hidden;
    }
    .card-link:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .card-link .link-icon { font-size: 13px; flex-shrink: 0; }
    .card-link .link-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .no-data { color: var(--border); font-style: italic; }

    /* Loading / error */
    #state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Setup modal */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
      width: 460px;
      max-width: 92vw;
    }
    .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .modal-title span { color: var(--blue); }
    .modal-sub { font-size: 12px; color: var(--sub); margin-bottom: 22px; line-height: 1.6; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--sub); margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 12px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--blue); }
    .btn-primary {
      width: 100%;
      background: var(--blue);
      border: none; color: #000;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      margin-top: 6px; transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--sub);
    }
    .empty-state .em-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

<div class="overlay" id="setup-overlay" style="display:none">
  <div class="modal">
    <div class="modal-title">Lane7 IT <span>Staff Directory</span></div>
    <div class="modal-sub">Connect to the Azure Function to load live staff data from Microsoft 365. Your key is stored locally only.</div>
    <div class="field">
      <label>Dashboard URL</label>
      <input id="cfg-url" type="text" placeholder="https://lane7-staff-directory-mcp-xxx.azurewebsites.net/dashboard">
    </div>
    <div class="field">
      <label>Function Key</label>
      <input id="cfg-key" type="text" placeholder="Paste your Azure function key">
    </div>
    <button class="btn-primary" onclick="saveAndConnect()">Connect</button>
  </div>
</div>

<header>
  <div class="logo">
    <div class="logo-badge">L7</div>
    <div>
      <div class="logo-title">Lane7 <span>IT</span> — Staff Directory</div>
      <div class="logo-sub">Live · Microsoft 365</div>
    </div>
  </div>
  <div class="header-right">
    <span class="timestamp" id="ts"></span>
    <button class="btn" onclick="loadData()">&#8635; Refresh</button>
    <button class="btn icon-btn" title="Settings" onclick="openSetup()">&#9881;</button>
  </div>
</header>

<div class="controls" id="controls" style="display:none">
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input id="search" type="text" placeholder="Search name, role, department…" oninput="applyFilter()">
  </div>
  <div class="dept-chips" id="dept-chips"></div>
  <span class="count-badge" id="count-badge"></span>
</div>

<div id="state">
  <div class="spinner"></div>
  <span style="font-size:12px;color:var(--sub)">Loading staff directory…</span>
</div>

<div class="grid-wrap" id="grid-wrap" style="display:none">
  <div class="grid" id="grid"></div>
</div>

<script>
// Avatar palette — bold colors that look great on dark backgrounds
const AVA_PALETTE = [
  '#FF1744','#FFD600','#00BCD4','#FF6D00','#7C4DFF',
  '#00E676','#FF4081','#40C4FF','#FFAB40','#B388FF'
]
// Department badge palette
const DEPT_PALETTE = {
  IT: { bg: 'rgba(0,188,212,0.15)', col: '#00BCD4' },
  Marketing: { bg: 'rgba(255,64,129,0.15)', col: '#FF4081' },
  HR: { bg: 'rgba(124,77,255,0.15)', col: '#B388FF' },
  Finance: { bg: 'rgba(255,213,0,0.15)', col: '#FFD600' },
  Operations: { bg: 'rgba(255,109,0,0.15)', col: '#FF6D00' },
  'Food & Beverage': { bg: 'rgba(0,230,118,0.15)', col: '#00E676' },
  Accounts: { bg: 'rgba(255,213,0,0.15)', col: '#FFD600' },
  Management: { bg: 'rgba(255,23,68,0.15)', col: '#FF1744' },
}

let allStaff = []
let activeDept = 'All'

function deptStyle(dept) {
  const match = Object.entries(DEPT_PALETTE).find(([k]) =>
    dept && dept.toLowerCase().includes(k.toLowerCase())
  )
  return match ? match[1] : { bg: 'rgba(255,255,255,0.06)', col: '#888' }
}

function avatarColor(name) {
  if (!name) return AVA_PALETTE[0]
  let h = 0
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) % AVA_PALETTE.length
  return AVA_PALETTE[Math.abs(h)]
}

function initials(name) {
  if (!name) return '?'
  const parts = name.trim().split(/\s+/)
  return (parts[0][0] + (parts[parts.length - 1]?.[0] || '')).toUpperCase()
}

// ── Config ────────────────────────────────────────────────────────────────────
function cfg() {
  return { url: localStorage.getItem('l7_staff_url'), key: localStorage.getItem('l7_staff_key') }
}
function openSetup() {
  const c = cfg()
  if (c.url) document.getElementById('cfg-url').value = c.url
  if (c.key) document.getElementById('cfg-key').value = c.key
  document.getElementById('setup-overlay').style.display = 'flex'
}
function saveAndConnect() {
  const url = document.getElementById('cfg-url').value.trim().replace(/\/$/, '')
  const key = document.getElementById('cfg-key').value.trim()
  if (!url || !key) return
  localStorage.setItem('l7_staff_url', url)
  localStorage.setItem('l7_staff_key', key)
  document.getElementById('setup-overlay').style.display = 'none'
  loadData()
}

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadData() {
  const { url, key } = cfg()
  if (!url || !key) { openSetup(); return }

  showState('<div class="spinner"></div><span style="font-size:12px;color:var(--sub)">Loading staff directory…</span>')

  try {
    const res = await fetch(`${url}?code=${encodeURIComponent(key)}`, { cache: 'no-store' })
    if (!res.ok) throw new Error(`HTTP ${res.status}`)
    const data = await res.json()
    if (data.error) throw new Error(data.error)

    allStaff = data.filter(s => s.name)
    document.getElementById('ts').textContent = `Updated ${new Date().toLocaleTimeString()}`
    buildDeptChips()
    applyFilter()

    document.getElementById('state').style.display = 'none'
    document.getElementById('grid-wrap').style.display = 'block'
    document.getElementById('controls').style.display = 'flex'
  } catch (e) {
    showState(`
      <div style="text-align:center">
        <div style="font-size:32px;margin-bottom:10px">⚠</div>
        <div style="font-size:14px;font-weight:700;color:var(--pink)">${e.message}</div>
        <div style="font-size:11px;color:var(--sub);margin-top:6px">Check your function URL and key</div>
        <button class="btn" style="margin-top:16px" onclick="loadData()">Retry</button>
        <button class="btn" style="margin-top:8px" onclick="openSetup()">Settings</button>
      </div>`)
  }
}

function showState(html) {
  document.getElementById('grid-wrap').style.display = 'none'
  document.getElementById('controls').style.display = 'none'
  const s = document.getElementById('state')
  s.style.display = 'flex'
  s.innerHTML = html
}

// ── Departments ───────────────────────────────────────────────────────────────
function buildDeptChips() {
  const depts = ['All', ...new Set(allStaff.map(s => s.department || 'Unknown').sort())]
  document.getElementById('dept-chips').innerHTML = depts.map(d => `
    <button class="chip ${d === 'All' ? 'all active' : ''}" onclick="setDept('${d}')" id="chip-${d.replace(/\s+/g,'-')}">${d}</button>
  `).join('')
}

function setDept(dept) {
  activeDept = dept
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'))
  document.getElementById(`chip-${dept.replace(/\s+/g,'-')}`)?.classList.add('active')
  applyFilter()
}

// ── Filter ────────────────────────────────────────────────────────────────────
function applyFilter() {
  const q = (document.getElementById('search')?.value || '').toLowerCase().trim()
  const filtered = allStaff.filter(s => {
    const deptMatch = activeDept === 'All' || (s.department || 'Unknown') === activeDept
    if (!deptMatch) return false
    if (!q) return true
    return [s.name, s.jobTitle, s.department, s.email, s.office]
      .some(v => v && v.toLowerCase().includes(q))
  })

  const sort = [...filtered].sort((a, b) => (a.name || '').localeCompare(b.name || ''))
  renderGrid(sort)
  document.getElementById('count-badge').textContent = `${sort.length} of ${allStaff.length} staff`
}

// ── Grid ──────────────────────────────────────────────────────────────────────
function renderGrid(staff) {
  const grid = document.getElementById('grid')
  if (!staff.length) {
    grid.innerHTML = `<div class="empty-state"><div class="em-icon">👤</div><p>No staff members match your search.</p></div>`
    return
  }

  grid.innerHTML = staff.map(s => {
    const bg = avatarColor(s.name)
    const dept = s.department || 'Unknown'
    const ds = deptStyle(dept)
    return `
    <div class="card">
      <div class="card-top">
        <div class="avatar" style="background:${bg}">${initials(s.name)}</div>
        <div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-role">${esc(s.jobTitle) || '<span class="no-data">No role set</span>'}</div>
        </div>
      </div>
      <div class="card-dept" style="background:${ds.bg};color:${ds.col}">${esc(dept)}</div>
      <div class="card-links">
        ${s.office ? `<span class="card-link"><span class="link-icon">📍</span><span class="link-text">${esc(s.office)}</span></span>` : ''}
        ${s.email ? `<a class="card-link" href="mailto:${esc(s.email)}"><span class="link-icon">✉</span><span class="link-text">${esc(s.email)}</span></a>` : ''}
      </div>
    </div>`
  }).join('')
}

function esc(s) {
  if (!s) return ''
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── Init ──────────────────────────────────────────────────────────────────────
setInterval(loadData, 10 * 60 * 1000) // auto-refresh every 10 min

const c = cfg()
if (!c.url || !c.key) {
  document.getElementById('state').style.display = 'none'
  openSetup()
} else {
  loadData()
}
</script>
</body>
</html>
